<h2>选择博客 UI 风格</h2>
<p class="subtitle">点击选择你喜欢的风格</p>

<div class="cards">
  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fafafa;padding:20px;text-align:center;">
        <div style="width:60px;height:8px;background:#333;margin:0 auto 15px;border-radius:2px;"></div>
        <div style="width:80%;height:4px;background:#e0e0e0;margin:0 auto 8px;border-radius:1px;"></div>
        <div style="width:70%;height:4px;background:#e0e0e0;margin:0 auto 8px;border-radius:1px;"></div>
        <div style="width:75%;height:4px;background:#e0e0e0;margin:0 auto 20px;border-radius:1px;"></div>
        <div style="width:50%;height:20px;background:#f5f5f5;border:1px solid #e0e0e0;margin:0 auto;border-radius:3px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>简约干净</h3>
      <p>大量留白，专注内容，阅读体验优先</p>
    </div>
  </div>

  <div class="card" data-choice="tech" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#1a1a2e;padding:20px;text-align:center;">
        <div style="width:60px;height:8px;background:#00d9ff;margin:0 auto 15px;border-radius:2px;"></div>
        <div style="width:80%;height:4px;background:#16213e;margin:0 auto 8px;border-radius:1px;"></div>
        <div style="width:70%;height:4px;background:#16213e;margin:0 auto 8px;border-radius:1px;"></div>
        <div style="width:75%;height:4px;background:#16213e;margin:0 auto 20px;border-radius:1px;"></div>
        <div style="width:50%;height:20px;background:#0f3460;border:1px solid #00d9ff;margin:0 auto;border-radius:3px;color:#00d9ff;font-size:10px;line-height:20px;">CODE</div>
      </div>
    </div>
    <div class="card-body">
      <h3>现代技术风</h3>
      <p>暗色系，代码高亮，技术感强</p>
    </div>
  </div>

  <div class="card" data-choice="creative" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px;text-align:center;">
        <div style="width:60px;height:8px;background:#fff;margin:0 auto 15px;border-radius:50px;transform:rotate(-5deg);"></div>
        <div style="width:80%;height:4px;background:rgba(255,255,255,0.5);margin:0 auto 8px;border-radius:1px;"></div>
        <div style="width:60%;height:30px;background:rgba(255,255,255,0.9);margin:0 auto 8px;border-radius:8px;transform:rotate(2deg);"></div>
        <div style="width:70%;height:25px;background:rgba(255,255,255,0.8);margin:0 auto 20px;border-radius:8px;transform:rotate(-1deg);"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>创意个性化</h3>
      <p>独特布局，渐变色彩，非传统设计</p>
    </div>
  </div>

  <div class="card" data-choice="magazine" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fff;padding:15px;text-align:center;">
        <div style="width:100%;height:50px;background:#2c3e50;margin:0 auto 10px;"></div>
        <div style="display:flex;gap:8px;margin-bottom:10px;">
          <div style="flex:1;height:40px;background:#3498db;"></div>
          <div style="flex:1;height:40px;background:#e74c3c;"></div>
        </div>
        <div style="width:80%;height:4px;background:#bdc3c7;margin:0 auto 6px;border-radius:1px;"></div>
        <div style="width:60%;height:4px;background:#bdc3c7;margin:0 auto 6px;border-radius:1px;"></div>
        <div style="width:70%;height:4px;background:#bdc3c7;margin:0 auto;border-radius:1px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>杂志风格</h3>
      <p>大图预览，分类清晰，视觉冲击</p>
    </div>
  </div>
</div>
