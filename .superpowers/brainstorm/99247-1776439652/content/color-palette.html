<h2>创意风格 - 渐变色系</h2>
<p class="subtitle">选择你喜欢的渐变色彩方案</p>

<div class="cards">
  <div class="card" data-choice="purple-pink" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:80px;"></div>
    </div>
    <div class="card-body">
      <h3>紫粉渐变</h3>
      <p>#667eea → #764ba2</p>
    </div>
  </div>

  <div class="card" data-choice="blue-cyan" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#0061ff 0%,#60efff 100%);height:80px;"></div>
    </div>
    <div class="card-body">
      <h3>蓝青科技</h3>
      <p>#0061ff → #60efff</p>
    </div>
  </div>

  <div class="card" data-choice="orange-red" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#f97316 0%,#ef4444 100%);height:80px;"></div>
    </div>
    <div class="card-body">
      <h3>橙红活力</h3>
      <p>#f97316 → #ef4444</p>
    </div>
  </div>

  <div class="card" data-choice="green-teal" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#10b981 0%,#14b8a6 100%);height:80px;"></div>
    </div>
    <div class="card-body">
      <h3>绿松自然</h3>
      <p>#10b981 → #14b8a6</p>
    </div>
  </div>
</div>
